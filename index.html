<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Text Cleaner</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 30px;
      background: #111827;
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    .box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    textarea {
      width: 100%;
      height: 400px;
      padding: 15px;
      border: none;
      border-radius: 10px;
      resize: none;
      font-size: 14px;
      background: #1f2937;
      color: white;
      outline: none;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      background: #2563eb;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    @media(max-width:768px) {
      .box {
        grid-template-columns: 1fr;
      }
    }

    #toast {
      position: fixed;
      top: 30px;
      right: 30px;
      background: #22c55e;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Auto Whitespace Remover</h1>

    <div class="box">

      <!-- INPUT -->
      <textarea id="inputText" placeholder="Paste your text here..."></textarea>

      <!-- OUTPUT -->
      <textarea id="outputText" placeholder="Cleaned output will appear here..." readonly></textarea>

    </div>

    <div class="buttons">
      <button onclick="copyOutput()">Copy Output</button>
      <button onclick="clearAll()">Clear</button>
    </div>
  </div>

  <script>

    const inputBox =
      document.getElementById("inputText");

    const outputBox =
      document.getElementById("outputText");

    // AUTO CLEAN WHEN USER TYPES OR PASTES
    inputBox.addEventListener("input", () => {

      const cleaned =
        inputBox.value.replace(/[\s\u00A0]+/g, '');

      outputBox.value = cleaned;
    });

    // COPY OUTPUT
    function copyOutput() {

      navigator.clipboard.writeText(outputBox.value);

      showToast("Copied Successfully!");
    }

    // CLEAR BOTH
    function clearAll() {

      inputBox.value = "";
      outputBox.value = "";
    }
    function showToast(message) {

      const toast =
        document.getElementById("toast");

      toast.innerText = message;

      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }

  </script>
  <div id="toast">Copied Successfully!</div>
</body>

</html>
